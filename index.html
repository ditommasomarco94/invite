<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>ciao :)</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at top, #ffe6ec, #fff);
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 25px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.1);
  position: relative;
}

button {
  padding: 12px 18px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  margin: 10px;
}

.yes {
  background: #ff4d7d;
  color: white;
}

.no {
  background: #eee;
  position: absolute;
}

.hidden { display: none; }

.fade {
  animation: fade .3s ease;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

.memo {
  font-size: 13px;
  opacity: 0.6;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<!-- STEP 1 -->
<div id="s1">
  <h2>Visto il caldo, ti va di bere qualcosa? 🍺🍷</h2>

  <button class="yes" onclick="yes()">Sì 😌</button>
  <button class="no" id="noBtn" onmouseover="moveNo()">No 🙈</button>
</div>

<!-- STEP 2 -->
<div id="s2" class="hidden fade">
  <h2>Lo sapevo 😏</h2>
  <p>Dove andiamo?</p>

  <button onclick="zone('Nord')">Milano Nord 🌿</button>
  <button onclick="zone('Sud')">Milano Sud 🌇</button>

  <div class="memo">
    io ho dei crediti per venire a Milano Nord 🥺
  </div>
</div>

<!-- STEP 3 -->
<div id="s3" class="hidden fade">
  <h2>Quando?</h2>

  <button onclick="time('Martedì')">Martedì</button>
  <button onclick="time('Dopo Parigi')">Dopo la vacanzina a Parigi ✈️</button>
</div>

<!-- STEP 4 -->
<div id="s4" class="hidden fade">
  <h2>Ok, quando?</h2>

  <button onclick="finale('Dopo lavoro')">Dopo lavoro</button>
  <button onclick="finale('Weekend')">Anche weekend</button>
</div>

<!-- FINAL -->
<div id="final" class="hidden fade">
  <h2>Perfetto 🤗🎉</h2>

  <p>Allora ci possiamo organizzare a voce ahah</p>

  <div style="font-size:40px;">
    🤗🎆🍺🍷✨
  </div>
</div>

</div>
</div>

<script>

let noBtn = document.getElementById("noBtn");

function yes(){
  document.getElementById("s1").classList.add("hidden");
  document.getElementById("s2").classList.remove("hidden");
}

function moveNo(){
  let x = Math.random() * 220;
  let y = Math.random() * 220;
  noBtn.style.transform = `translate(${x}px, ${y}px)`;
}

function zone(z){
  document.getElementById("s2").classList.add("hidden");
  document.getElementById("s3").classList.remove("hidden");
}

function time(t){
  document.getElementById("s3").classList.add("hidden");
  document.getElementById("s4").classList.remove("hidden");
}

function finale(x){
  document.getElementById("s4").classList.add("hidden");
  document.getElementById("final").classList.remove("hidden");
}

</script>

</body>
</html>
