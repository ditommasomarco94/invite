<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>ciao :)</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #e5ddd5;
}

.chat {
  max-width: 420px;
  margin: auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 15px;
}

.bubble {
  padding: 12px 14px;
  border-radius: 18px;
  margin: 6px 0;
  max-width: 80%;
  font-size: 15px;
  line-height: 1.3;
  animation: pop .25s ease;
}

.me {
  background: #dcf8c6;
  align-self: flex-end;
  border-bottom-right-radius: 5px;
}

.her {
  background: white;
  align-self: flex-start;
  border-bottom-left-radius: 5px;
}

.options {
  display: flex;
  flex-direction: column;
  margin-top: 10px;
}

button {
  margin-top: 8px;
  padding: 10px 12px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
}

@keyframes pop {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="chat" id="chat">

  <!-- BOT INTRO -->
  <div class="bubble her" id="m1">Ehi 🙂</div>

  <div class="bubble her hidden" id="m2">
    Visto il caldo, ti va di bere qualcosa? 🍺🍷
  </div>

  <!-- OPTIONS 1 -->
  <div class="options hidden" id="o1">
    <button onclick="yes()">Sì 😌</button>
    <button onclick="no()">No 🙈</button>
  </div>

  <div class="bubble her hidden" id="noMsg">
    Sei sicura? 🥺
  </div>

  <!-- STEP 2 -->
  <div class="bubble her hidden" id="m3">
    Lo sapevo 😏 Dove andiamo?
  </div>

  <div class="options hidden" id="o2">
    <button onclick="zone()">Milano Nord 🌿</button>
    <button onclick="zone()">Milano Sud 🌇</button>
  </div>

  <div class="bubble her hidden" id="memo">
    io ho dei crediti per venire a Milano Nord 🥺
  </div>

  <!-- STEP 3 -->
  <div class="bubble her hidden" id="m4">Quando?</div>

  <div class="options hidden" id="o3">
    <button onclick="time()">Martedì</button>
    <button onclick="time()">Dopo la vacanza a Parigi ✈️</button>
  </div>

  <!-- STEP 4 -->
  <div class="bubble her hidden" id="m5">Quando preferisci?</div>

  <div class="options hidden" id="o4">
    <button onclick="final()">Dopo lavoro</button>
    <button onclick="final()">Anche weekend</button>
  </div>

  <!-- FINAL -->
  <div class="bubble her hidden" id="finalMsg">
    Perfetto 🤗🎉 allora ci possiamo organizzare a voce ahah
  </div>

  <div class="bubble me hidden" id="end">
    🍺🍷🎆✨🤗
  </div>

</div>

<script>

setTimeout(()=>document.getElementById("m2").classList.remove("hidden"), 800);
setTimeout(()=>document.getElementById("o1").classList.remove("hidden"), 1400);

function yes(){
  document.getElementById("o1").classList.add("hidden");

  setTimeout(()=>document.getElementById("m3").classList.remove("hidden"), 500);
  setTimeout(()=>document.getElementById("o2").classList.remove("hidden"), 1000);
  setTimeout(()=>document.getElementById("memo").classList.remove("hidden"), 1000);
}

function no(){
  document.getElementById("noMsg").classList.remove("hidden");
}

function zone(){
  document.getElementById("o2").classList.add("hidden");

  setTimeout(()=>document.getElementById("m4").classList.remove("hidden"), 600);
  setTimeout(()=>document.getElementById("o3").classList.remove("hidden"), 1100);
}

function time(){
  document.getElementById("o3").classList.add("hidden");

  setTimeout(()=>document.getElementById("m5").classList.remove("hidden"), 600);
  setTimeout(()=>document.getElementById("o4").classList.remove("hidden"), 1100);
}

function final(){
  document.getElementById("o4").classList.add("hidden");

  setTimeout(()=>document.getElementById("finalMsg").classList.remove("hidden"), 600);
  setTimeout(()=>document.getElementById("end").classList.remove("hidden"), 1100);
}

</script>

</body>
</html>
