<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>🍷 Una cosa veloce</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at top, #ffe6ec, #fff);
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 25px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.1);
  transition: all .4s ease;
  position: relative;
}

h1, h2 {
  margin-bottom: 20px;
}

button {
  padding: 12px 18px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  margin: 10px;
  transition: 0.2s;
}

.yes {
  background: #ff4d7d;
  color: white;
  transform: scale(1);
}

.yes:hover { transform: scale(1.05); }

.no {
  background: #eee;
  position: absolute;
}

.fade {
  animation: fade .4s ease;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

.hidden { display: none; }

.big {
  font-size: 22px;
}

.confetti {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="container">

<div class="card" id="card">

  <!-- STEP 1 -->
  <div id="s1">
    <h1>Andiamo a bere una cosina? 🍷🍺</h1>
    <button class="yes" onclick="yes()">Sì 😌✨</button>
    <button class="no" id="noBtn" onmouseover="moveNo()">No 🙈</button>
  </div>

  <!-- STEP 2 -->
  <div id="s2" class="hidden fade">
    <h2>Lo sapevo 😏</h2>
    <p class="big">Dove andiamo?</p>
    <button onclick="zone('Nord')">Milano Nord 🌿</button>
    <button onclick="zone('Sud')">Milano Sud 🌇</button>
  </div>

  <!-- STEP 3 -->
  <div id="s3" class="hidden fade">
    <h2>Io ho dei crediti per venire su 🥺</h2>
    <p>Quando?</p>
    <button onclick="time('Oggi')">Oggi?</button>
    <button onclick="time('Settimana prossima')">Prima che parti 😢</button>
  </div>

  <!-- FINAL -->
  <div id="s4" class="hidden fade">
    <h1>Perfetto 🎉✨</h1>
    <p>Ci sentiamo 💌</p>
    <div style="font-size:40px;">🍷🍺🎊✨🍾</div>
  </div>

</div>
</div>

<canvas class="confetti" id="confetti"></canvas>

<script>
let noBtn = document.getElementById("noBtn");
let step = 1;

function yes(){
  document.getElementById("s1").classList.add("hidden");
  document.getElementById("s2").classList.remove("hidden");
}

function moveNo(){
  let x = Math.random() * 200;
  let y = Math.random() * 200;
  noBtn.style.transform = `translate(${x}px, ${y}px)`;
}

function zone(z){
  document.getElementById("s2").classList.add("hidden");
  document.getElementById("s3").classList.remove("hidden");
}

function time(t){
  document.getElementById("s3").classList.add("hidden");
  document.getElementById("s4").classList.remove("hidden");

  launchConfetti();
}

/* 🎊 CONFETTI SIMPLE */
function launchConfetti(){
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let pieces = [];

  for(let i=0;i<120;i++){
    pieces.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*6+2,
      d: Math.random()*100
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#ff4d7d";

    pieces.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
      ctx.fill();
    });

    update();
  }

  function update(){
    pieces.forEach(p=>{
      p.y += Math.random()*3+2;
      if(p.y > canvas.height){
        p.y = 0;
        p.x = Math.random()*canvas.width;
      }
    });
  }

  setInterval(draw, 30);
}
</script>

</body>
</html>
