<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>ciao :)</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body{
margin:0;
font-family:Inter,sans-serif;
background:radial-gradient(circle at top,#ffe6ec,#fff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.card{
width:90%;
max-width:430px;
background:white;
padding:40px;
border-radius:28px;
box-shadow:0 25px 60px rgba(0,0,0,.08);
text-align:center;
position:relative;
}

h1{
font-size:26px;
margin-bottom:25px;
}

/* GLOBAL BUTTON UI */
.btn-row{
display:flex;
justify-content:center;
gap:14px;
position:relative;
height:80px;
align-items:center;
}

button{
height:46px;
min-width:130px;
padding:0 18px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:16px;
display:flex;
align-items:center;
justify-content:center;
white-space:nowrap;
transition:.2s ease;
}

.yes{
background:#ff5b8a;
color:white;
}

.yes:active{
transform:scale(.95);
}

.no{
background:#eee;
color:#111;
position:relative;
}

.hidden{display:none;}

.memo{
margin-top:16px;
font-size:13px;
opacity:.65;
}

.final{
font-size:18px;
line-height:1.6;
}

.fade{
animation:fade .35s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:none;}
}

/* typing */
.typing{
font-size:18px;
opacity:.6;
}

.dot{
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:.2;}
50%{opacity:1;}
100%{opacity:.2;}
}

</style>

</head>

<body>

<div class="card">

<!-- STEP 1 -->
<div id="s1" class="fade">

<h1>
Visto il caldo,<br>
ti va di bere qualcosa? 🧊🍸🍺
</h1>

<div class="btn-row">

<button class="yes" onclick="go2()">Sì 😌</button>
<button class="no" id="noBtn">No 🙈</button>

</div>

</div>

<!-- STEP 2 -->
<div id="s2" class="hidden fade">

<div id="typing" class="typing hidden">
sta scrivendo<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
</div>

<h1 id="ottimo" class="hidden">ottimo 😏</h1>

<p>
Dove andiamo? 😊<br><br>
Milano Nord 🌿 oppure Milano Sud 🌇
</p>

<div class="btn-row">

<button onclick="go3()">Milano Nord 🌿</button>
<button onclick="go3()">Milano Sud 🌇</button>

</div>

<div class="memo">
ho dei crediti da consumare per venire a Milano Nord 😌👉👈
</div>

</div>

<!-- STEP 3 -->
<div id="s3" class="hidden fade">

<h1>Quando?</h1>

<div class="btn-row">

<button onclick="finalStep()">Martedì 🌞</button>
<button onclick="finalStep()">Dopo la vacanzina a Parigi 🥐</button>

</div>

</div>

<!-- FINAL -->
<div id="final" class="hidden fade">

<div class="final">

ora ci possiamo organizzare a voce ahah

<br><br>

🧊✨🍸🍺✨🧊

</div>

</div>

</div>

<script>

const noBtn =
document.getElementById("noBtn");

const btnRow =
document.querySelector(".btn-row");

let activated = false;

/* 🔥 MORE LIVELY NO BUTTON */
function moveNo(){

const r =
btnRow.getBoundingClientRect();

/* lock initial position */
if(!activated){

const rect =
noBtn.getBoundingClientRect();

const parent =
btnRow.getBoundingClientRect();

noBtn.style.position="absolute";

noBtn.style.left =
(rect.left - parent.left) + "px";

noBtn.style.top =
(rect.top - parent.top) + "px";

activated = true;
}

/* 💥 BIGGER RANDOM RANGE + more chaos */
const maxX = r.width - 150;
const maxY = r.height - 70;

/* avoid center zone */
let x, y;
do {
x = Math.random() * maxX;
y = Math.random() * maxY;
} while (x > maxX*0.3 && x < maxX*0.7);

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

/* little “double jump” effect */
setTimeout(()=>{
noBtn.style.transform = "scale(1.05)";
setTimeout(()=>{
noBtn.style.transform = "scale(1)";
},120);
},80);

}

/* stronger interaction */
noBtn.addEventListener("mouseenter", moveNo);
noBtn.addEventListener("click", moveNo);
noBtn.addEventListener("touchstart", moveNo);

/* YES flow */
function go2(){

document.getElementById("s1").classList.add("hidden");
document.getElementById("s2").classList.remove("hidden");

setTimeout(()=>{
document.getElementById("typing").classList.remove("hidden");
},400);

setTimeout(()=>{
document.getElementById("typing").classList.add("hidden");
document.getElementById("ottimo").classList.remove("hidden");
},1600);

}

/* steps */
function go3(){
document.getElementById("s2").classList.add("hidden");
document.getElementById("s3").classList.remove("hidden");
}

function finalStep(){
document.getElementById("s3").classList.add("hidden");
document.getElementById("final").classList.remove("hidden");
}

/* init */
window.onload = () => {
activated = false;
};

</script>

</body>
</html>
