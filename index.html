<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>ciao :)</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body{
margin:0;
font-family:Inter,sans-serif;
background:radial-gradient(circle at top,#ffe6ec,#fff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.card{
width:90%;
max-width:430px;
background:white;
padding:40px;
border-radius:28px;
box-shadow:0 25px 60px rgba(0,0,0,.08);
text-align:center;
position:relative;
transition:.4s ease;
}

h1{
font-size:26px;
margin-bottom:25px;
}

button{
padding:14px 20px;
border:none;
border-radius:14px;
margin:10px;
cursor:pointer;
font-size:16px;
transition:.2s ease;
}

.yes{
background:#ff5b8a;
color:white;
}

.yes:active{
transform:scale(0.95);
}

.no{
background:rgba(255,255,255,0.6);
backdrop-filter: blur(10px);
border:1px solid rgba(0,0,0,0.08);
position:absolute;
left:50%;
transform:translateX(-50%);
}

.hidden{
display:none;
}

.memo{
margin-top:16px;
font-size:13px;
opacity:.65;
}

.final{
font-size:18px;
line-height:1.6;
}

/* fade anim */
.fade{
animation:fade .35s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}

/* typing */
.typing{
font-size:18px;
opacity:.7;
display:inline-block;
}

.dot{
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:.2;}
50%{opacity:1;}
100%{opacity:.2;}
}

</style>

</head>

<body>

<div class="card">

<!-- STEP 1 -->
<div id="s1" class="fade">

<h1>
Visto il caldo,<br>
ti va di bere qualcosa? 🧊🍸🍺
</h1>

<button class="yes" onclick="go2()">Sì 😌</button>
<button class="no" id="noBtn">No 🙈</button>

</div>

<!-- STEP 2 -->
<div id="s2" class="hidden fade">

<div id="typing" class="typing hidden">
sta scrivendo<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
</div>

<h1 id="ottimo" class="hidden">ottimo 😏</h1>

<p>Dove andiamo? 😊<br><br>
Milano Nord 🌿 oppure Milano Sud 🌇</p>

<button onclick="go3()">Milano Nord 🌿</button>
<button onclick="go3()">Milano Sud 🌇</button>

<div class="memo">
ho dei crediti da consumare per venire a Milano Nord 😌👉👈
</div>

</div>

<!-- STEP 3 -->
<div id="s3" class="hidden fade">

<h1>Quando?</h1>

<button onclick="finalStep()">Tipo… martedì 🌞</button>
<button onclick="finalStep()">Dopo la tua vacanzina a Parigi 🥐</button>

</div>

<!-- FINAL -->
<div id="final" class="hidden fade">

<div class="final">

ora ci possiamo organizzare a voce ahah

<br><br>

🧊✨🍸🍺✨🧊

</div>

</div>

</div>

<script>

const noBtn =
document.getElementById("noBtn");

const card =
document.querySelector(".card");

/* 🎯 NO starts aligned next to YES */
function initNo(){

const r =
card.getBoundingClientRect();

noBtn.style.position="absolute";

noBtn.style.left="50%";

noBtn.style.top="180px";

noBtn.style.transform="translateX(-50%)";

}

function moveNo(){

const r =
card.getBoundingClientRect();

const btnW = 120;
const btnH = 60;

const x =
Math.random() * (r.width - btnW);

const y =
120 + Math.random() * (r.height - 200);

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

}

/* hover behavior */
noBtn.addEventListener("mouseenter", moveNo);
noBtn.addEventListener("click", moveNo);

/* YES micro vibration */
function vibrateYes(btn){

btn.style.transform="scale(1.05)";
setTimeout(()=>btn.style.transform="scale(1)",120);
}

/* STEP FLOW */
function go2(){

vibrateYes(event.target);

document.getElementById("s1").classList.add("hidden");
document.getElementById("s2").classList.remove("hidden");

/* typing effect */
setTimeout(()=>{
document.getElementById("typing").classList.remove("hidden");
},400);

setTimeout(()=>{
document.getElementById("typing").classList.add("hidden");
document.getElementById("ottimo").classList.remove("hidden");
},1600);

}

function go3(){

document.getElementById("s2").classList.add("hidden");
document.getElementById("s3").classList.remove("hidden");

}

function finalStep(){

document.getElementById("s3").classList.add("hidden");
document.getElementById("final").classList.remove("hidden");

}

/* init */
initNo();
moveNo();

</script>

</body>
</html>
