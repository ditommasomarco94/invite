<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>ciao :)</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

body{
margin:0;
font-family:Inter,sans-serif;
background:radial-gradient(circle at top,#ffe6ec,#fff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.card{
width:90%;
max-width:430px;
background:white;
padding:40px;
border-radius:28px;
box-shadow:0 25px 60px rgba(0,0,0,.08);
text-align:center;
position:relative;
}

h1{
font-size:26px;
margin-bottom:30px;
}

button{
padding:14px 20px;
border:none;
border-radius:14px;
margin:10px;
cursor:pointer;
font-size:16px;
}

.yes{
background:#ff5b8a;
color:white;
}

.no{
background:#eee;
position:absolute;
left:50%;
transform:translateX(-50%);
}

.hidden{
display:none;
}

.memo{
margin-top:16px;
font-size:13px;
opacity:.65;
}

.final{
font-size:18px;
line-height:1.6;
}

</style>

</head>

<body>

<div class="card">

<!-- STEP 1 -->
<div id="s1">

<h1>
Visto il caldo,<br>
ti va di andare a bere qualcosa? 🧊🍺🍸🧊
</h1>

<button class="yes" onclick="step2()">Sì 😌</button>
<button class="no" id="noBtn">No 🙈</button>

</div>

<!-- STEP 2 -->
<div id="s2" class="hidden">

<h1>ottimo 😏</h1>

<p>
Dove andiamo? 😊<br><br>
Milano Nord 🌿 oppure Milano Sud 🌇
</p>

<button onclick="step3()">Milano Nord 🌿</button>
<button onclick="step3()">Milano Sud 🌇</button>

<div class="memo">
ho dei crediti da consumare per venire a Milano Nord 😌👉👈
</div>

</div>

<!-- STEP 3 -->
<div id="s3" class="hidden">

<h1>Quando?</h1>

<button onclick="final()">Tipo, emh..martedì🌞</button>
<button onclick="final()">Dopo la tua vacanzina a Parigi 🥐</button>

</div>

<!-- FINAL -->
<div id="final" class="hidden">

<div class="final">

ora ci possiamo organizzare a voce ahah

<br><br>

🧊✨🍺🍷✨🧊

</div>

</div>

</div>

<script>

const noBtn =
document.getElementById("noBtn");

const card =
document.querySelector(".card");

function moveNo(){

const r =
card.getBoundingClientRect();

const x =
Math.random() * (r.width - 140);

const y =
Math.random() * (r.height - 120);

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

}

noBtn.addEventListener("mouseenter", moveNo);
noBtn.addEventListener("click", moveNo);

function step2(){

document.getElementById("s1").classList.add("hidden");
document.getElementById("s2").classList.remove("hidden");

}

function step3(){

document.getElementById("s2").classList.add("hidden");
document.getElementById("s3").classList.remove("hidden");

}

function final(){

document.getElementById("s3").classList.add("hidden");
document.getElementById("final").classList.remove("hidden");

}

moveNo();

</script>

</body>
</html>
